version: '3.8'
services:
  finance-pro:
    image: python:3.12-slim
    ports:
      - "8501:8501"
    volumes: ['./:/app']
    working_dir: /app
    command: bash -c "pip install -r requirements.txt && streamlit run run_models.py --server.port 8501 --server.headless true --server.enableCORS false --server.enableXsrfProtection false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
